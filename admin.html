<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Sophie's Stardust</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Config (change password here) ── */
/* ADMIN_PASSWORD is set in the script below */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0D0D1A;
  --bg1:      #12102a;
  --bg2:      #1A1A2E;
  --bg3:      #221a38;
  --violet:   #7B2FBE;
  --violet2:  #9b4fde;
  --gold:     #F5C842;
  --teal:     #2DD4BF;
  --red:      #e05050;
  --green:    #4caf7d;
  --text:     #F0EEF6;
  --muted:    #9988bb;
  --dim:      #6655aa;
  --border:   #2a1a4a;
  --fd:       'Playfair Display', serif;
  --fb:       'DM Sans', sans-serif;
  --r:        8px;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Password screen ─────────────────────────── */
#pw-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1.2rem;
  background: radial-gradient(ellipse at 50% 0%, #2a1060 0%, var(--bg) 70%);
}
#pw-screen h1 { font-family: var(--fd); font-size: 1.5rem; color: var(--gold); }
#pw-screen p  { font-size: 13px; color: var(--muted); }
#pw-form { display: flex; gap: 0.5rem; }
.pw-input {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 0.55rem 0.9rem;
  color: var(--text); font-family: var(--fb); font-size: 14px;
  outline: none; width: 200px;
}
.pw-input:focus { border-color: var(--violet); }
#pw-error { font-size: 12px; color: var(--red); display: none; }

/* ── Topbar ──────────────────────────────────── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 52px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 1.25rem;
  gap: 1rem;
}
.topbar-logo { font-family: var(--fd); font-size: 15px; color: var(--gold); flex: 1; }
.topbar-logo span { color: var(--muted); font-family: var(--fb); font-size: 12px; font-weight: 400; margin-left: 8px; }
#dirty-badge {
  font-size: 11px; color: var(--gold);
  background: #2a1a0a; border: 1px solid #F5C84244;
  border-radius: 99px; padding: 2px 10px;
  display: none;
}
#dirty-badge.show { display: inline-block; }
.btn {
  padding: 0.45rem 1rem; border-radius: 99px;
  font-family: var(--fb); font-size: 12px; font-weight: 500;
  cursor: pointer; border: none; transition: opacity 0.15s;
  letter-spacing: 0.03em;
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.97); }
.btn-primary  { background: var(--violet); color: var(--text); }
.btn-gold     { background: var(--gold); color: var(--bg); font-weight: 600; }
.btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-danger   { background: transparent; color: var(--red); border: 1px solid #e0505033; }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 11px; }
.btn-icon { padding: 0.3rem 0.5rem; font-size: 13px; background: transparent; border: none; color: var(--dim); cursor: pointer; border-radius: 4px; }
.btn-icon:hover { color: var(--text); background: var(--bg3); }

/* ── Main layout ─────────────────────────────── */
#app { display: none; padding-top: 52px; height: 100vh; }
#layout { display: flex; height: calc(100vh - 52px); }

/* ── Sidebar ─────────────────────────────────── */
#sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 0.9rem 1rem 0.6rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
#sidebar-header h2 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); }
#tree { flex: 1; overflow-y: auto; padding: 0.5rem 0; }

.tree-category { border-bottom: 1px solid var(--border); }
.tree-cat-header {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.55rem 0.75rem 0.55rem 0.6rem;
  cursor: pointer; user-select: none;
}
.tree-cat-header:hover { background: var(--bg3); }
.tree-cat-toggle { color: var(--dim); font-size: 10px; width: 14px; flex-shrink: 0; }
.tree-cat-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.tree-cat-count { font-size: 10px; color: var(--dim); }
.tree-cat-actions { display: none; gap: 2px; }
.tree-cat-header:hover .tree-cat-actions { display: flex; }

.tree-quizzes { padding: 0 0 0.4rem 1.6rem; }
.tree-quiz {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.38rem 0.6rem 0.38rem 0.5rem;
  border-radius: 6px; cursor: pointer; margin: 1px 0.4rem 1px 0;
}
.tree-quiz:hover { background: var(--bg3); }
.tree-quiz.active { background: #7B2FBE22; }
.tree-quiz-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.tree-quiz.active .tree-quiz-dot { background: var(--violet); }
.tree-quiz-name { flex: 1; font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-quiz.active .tree-quiz-name { color: var(--text); }
.tree-quiz-count { font-size: 10px; color: var(--dim); flex-shrink: 0; }
.tree-quiz-actions { display: none; gap: 2px; }
.tree-quiz:hover .tree-quiz-actions { display: flex; }

.tree-add-quiz {
  display: flex; align-items: center; gap: 5px;
  padding: 0.32rem 0.6rem; margin: 2px 0.4rem;
  font-size: 11px; color: var(--dim); cursor: pointer;
  border-radius: 6px; border: 1px dashed var(--border);
}
.tree-add-quiz:hover { color: var(--teal); border-color: var(--teal); }

.tree-add-cat {
  margin: 0.6rem 0.75rem;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 0.45rem; font-size: 12px; color: var(--dim);
  cursor: pointer; border-radius: 6px; border: 1px dashed var(--border);
}
.tree-add-cat:hover { color: var(--violet); border-color: var(--violet); }

/* ── Main panel ──────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#main-header {
  padding: 1rem 1.5rem 0.8rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
  flex-shrink: 0;
}
.main-crumb { font-size: 11px; color: var(--dim); margin-bottom: 0.4rem; }
.main-title-row { display: flex; align-items: flex-start; gap: 0.75rem; }
.editable-title {
  font-family: var(--fd); font-size: 1.2rem; font-weight: 700;
  color: var(--text); border: none; background: transparent;
  outline: none; flex: 1; padding: 2px 6px; margin: -2px -6px;
  border-radius: 4px;
}
.editable-title:hover { background: var(--bg3); }
.editable-title:focus { background: var(--bg2); }
.editable-desc {
  font-size: 12px; color: var(--muted); border: none; background: transparent;
  outline: none; width: 100%; padding: 2px 6px; margin: 2px -6px 0;
  border-radius: 4px; font-family: var(--fb);
}
.editable-desc:hover { background: var(--bg3); }
.editable-desc:focus { background: var(--bg2); }
.main-stats { display: flex; gap: 1rem; margin-top: 0.5rem; }
.main-stat { font-size: 11px; color: var(--dim); }
.main-stat span { color: var(--teal); font-weight: 500; }

#questions-area { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }

/* ── Empty state ─────────────────────────────── */
#empty-state {
  height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 0.75rem; color: var(--dim);
  font-family: var(--fd); font-style: italic;
}
#empty-state .empty-icon { font-size: 2.5rem; opacity: 0.3; }

/* ── Question cards ──────────────────────────── */
.q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.85rem 1rem;
  margin-bottom: 0.6rem;
  display: flex; gap: 0.9rem; align-items: flex-start;
}
.q-card:hover { border-color: #3a2a5a; }
.q-num {
  font-family: var(--fd); font-size: 13px; color: var(--dim);
  width: 22px; text-align: right; flex-shrink: 0; padding-top: 1px;
}
.q-body { flex: 1; min-width: 0; }
.q-text { font-size: 13.5px; color: var(--text); margin-bottom: 0.5rem; line-height: 1.45; }
.q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 1rem; margin-bottom: 0.4rem; }
.q-opt { font-size: 12px; color: var(--muted); display: flex; gap: 5px; align-items: baseline; }
.q-opt-letter { color: var(--dim); font-size: 10px; width: 14px; flex-shrink: 0; }
.q-opt.correct { color: var(--teal); }
.q-opt.correct .q-opt-letter { color: var(--teal); }
.q-fact { font-size: 11px; color: var(--dim); font-style: italic; margin-top: 0.3rem; padding-top: 0.35rem; border-top: 1px solid var(--border); }
.q-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; align-items: flex-end; }
.q-edit-btn { font-size: 11px; font-family: var(--fb); font-weight: 500; color: var(--violet2); background: #7B2FBE18; border: 1px solid #7B2FBE44; border-radius: 5px; padding: 3px 8px; cursor: pointer; white-space: nowrap; }
.q-edit-btn:hover { background: #7B2FBE33; }

/* ── Add/Edit question form ──────────────────── */
#q-editor {
  background: var(--bg1);
  border-top: 1px solid var(--border);
  padding: 1.2rem 1.5rem;
  flex-shrink: 0;
  max-height: 50vh;
  overflow-y: auto;
}
#q-editor h3 {
  font-family: var(--fd); font-size: 14px; color: var(--gold);
  margin-bottom: 1rem;
}
.form-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; align-items: flex-start; }
.form-col { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; }
label { font-size: 11px; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; }
.f-input, .f-textarea {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 0.5rem 0.7rem;
  color: var(--text); font-family: var(--fb); font-size: 13px;
  outline: none; transition: border-color 0.15s;
  width: 100%;
}
.f-input:focus, .f-textarea:focus { border-color: var(--violet); }
.f-textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.f-input.error, .f-textarea.error { border-color: var(--red); }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
.option-row { display: flex; gap: 0.5rem; align-items: center; }
.opt-radio {
  width: 16px; height: 16px; accent-color: var(--teal);
  cursor: pointer; flex-shrink: 0;
}
.opt-letter { font-size: 11px; color: var(--dim); width: 14px; flex-shrink: 0; }
.editor-actions { display: flex; gap: 0.5rem; align-items: center; }
.validation-msg { font-size: 12px; color: var(--red); flex: 1; }

/* ── Modal ───────────────────────────────────── */
#modal-overlay {
  position: fixed; inset: 0; background: #000000aa;
  display: none; align-items: center; justify-content: center; z-index: 200;
}
#modal-overlay.show { display: flex; }
#modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem; width: 360px;
  max-width: 90vw;
}
#modal h3 { font-family: var(--fd); font-size: 1rem; color: var(--gold); margin-bottom: 0.5rem; }
#modal p { font-size: 13px; color: var(--muted); margin-bottom: 1.2rem; }
.modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

/* ── Toast ───────────────────────────────────── */
#toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.6rem 1rem;
  font-size: 13px; color: var(--text);
  display: none; z-index: 300;
  box-shadow: 0 4px 20px #00000066;
}
#toast.show { display: block; }
#toast.success { border-color: var(--green); color: var(--green); }
#toast.error   { border-color: var(--red);   color: var(--red); }

/* ── Scrollbar ───────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Password screen ──────────────────────── -->
<div id="pw-screen">
  <h1>✦ Sophie's Stardust</h1>
  <p>Quiz Admin</p>
  <form id="pw-form" onsubmit="checkPw(event)">
    <input id="pw-input" class="pw-input" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn btn-primary" type="submit">Enter</button>
  </form>
  <div id="pw-error">Incorrect password</div>
</div>

<!-- ── Top bar ──────────────────────────────── -->
<div id="topbar" style="display:none">
  <div class="topbar-logo">✦ Sophie's Stardust <span>Quiz Admin</span></div>
  <div id="dirty-badge">Unsaved changes</div>
  <label class="btn btn-ghost btn-sm" for="load-file" style="cursor:pointer">Load JSON</label>
  <input id="load-file" type="file" accept=".json" style="display:none" onchange="loadFile(event)">
  <button class="btn btn-gold" onclick="downloadJSON()">⬇ Download quizzes.json</button>
</div>

<!-- ── Main app ──────────────────────────────── -->
<div id="app">
<div id="layout">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Quizzes</h2>
    </div>
    <div id="tree"></div>
    <div class="tree-add-cat" onclick="addCategory()">+ Add category</div>
  </div>

  <!-- Main panel -->
  <div id="main">
    <div id="main-header">
      <div id="empty-header" style="color:var(--dim);font-style:italic;font-size:13px">
        Select a quiz from the sidebar, or create a new one.
      </div>
      <div id="quiz-header" style="display:none">
        <div class="main-crumb" id="crumb"></div>
        <div class="main-title-row">
          <input class="editable-title" id="quiz-name-input" placeholder="Quiz name" oninput="onQuizMetaChange()">
        </div>
        <input class="editable-desc" id="quiz-desc-input" placeholder="Short description (shown on the homepage)" oninput="onQuizMetaChange()">
        <div class="main-stats">
          <div class="main-stat">Questions: <span id="stat-q">0</span></div>
          <div class="main-stat" id="stat-warn" style="color:var(--gold);display:none"></div>
        </div>
      </div>
    </div>

    <div id="questions-area">
      <div id="empty-state">
        <div class="empty-icon">✦</div>
        <div>Select a quiz to see its questions</div>
      </div>
      <div id="q-list" style="display:none"></div>
      <div id="add-q-btn-wrap" style="display:none;margin-top:0.5rem">
        <button class="btn btn-primary btn-sm" onclick="openEditor(-1)">+ Add question</button>
      </div>
    </div>

    <!-- Question editor -->
    <div id="q-editor" style="display:none">
      <h3 id="editor-title">Add question</h3>
      <div class="form-row">
        <div class="form-col">
          <label>Question</label>
          <textarea class="f-textarea" id="f-q" placeholder="Type the question here…" rows="2"></textarea>
        </div>
      </div>
      <div class="options-grid">
        <div class="option-row"><input type="radio" name="correct" class="opt-radio" value="0"><span class="opt-letter">A</span><input class="f-input" id="f-o0" placeholder="Option A"></div>
        <div class="option-row"><input type="radio" name="correct" class="opt-radio" value="1"><span class="opt-letter">B</span><input class="f-input" id="f-o1" placeholder="Option B"></div>
        <div class="option-row"><input type="radio" name="correct" class="opt-radio" value="2"><span class="opt-letter">C</span><input class="f-input" id="f-o2" placeholder="Option C"></div>
        <div class="option-row"><input type="radio" name="correct" class="opt-radio" value="3"><span class="opt-letter">D</span><input class="f-input" id="f-o3" placeholder="Option D"></div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label>Fun fact shown after answering <em style="text-transform:none;letter-spacing:0">(optional but recommended)</em></label>
          <textarea class="f-textarea" id="f-fact" placeholder="Interesting fact about this question…" rows="2"></textarea>
        </div>
      </div>
      <div class="editor-actions">
        <span class="validation-msg" id="v-msg"></span>
        <button class="btn btn-ghost btn-sm" onclick="closeEditor()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveQuestion()">Save question</button>
        <button class="btn btn-ghost btn-sm" id="save-next-btn" onclick="saveQuestion(true)" title="Save and immediately add another">Save &amp; next</button>
      </div>
    </div>
  </div>

</div>
</div>

<!-- ── Modal ──────────────────────────────────── -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <div class="form-row" id="modal-input-row" style="margin-bottom:1rem;display:none">
      <div class="form-col">
        <label id="modal-input-label"></label>
        <input class="f-input" id="modal-input">
        <label id="modal-input2-label" style="margin-top:0.5rem"></label>
        <input class="f-input" id="modal-input2" style="margin-top:0.25rem">
      </div>
    </div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────── -->
<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────
const ADMIN_PASSWORD = 'stardust'; // ← change this

// ── State ─────────────────────────────────────
let data = null;           // full quizzes.json object
let selCatId  = null;
let selQuizId = null;
let editingIdx = null;     // null=closed, -1=new, >=0=editing index
let dirty = false;

// ── Password ──────────────────────────────────
function checkPw(e) {
  e.preventDefault();
  if (document.getElementById('pw-input').value === ADMIN_PASSWORD) {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('app').style.display = 'block';
    loadFromSite();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

// ── Load data ─────────────────────────────────
async function loadFromSite() {
  try {
    const res = await fetch('data/quizzes.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    data = await res.json();
    renderTree();
    toast('Loaded quizzes.json from site ✓', 'success');
  } catch {
    // Couldn't fetch — start with empty structure
    data = { categories: [] };
    renderTree();
    toast('Could not load quizzes.json — starting fresh. Use "Load JSON" to import.', 'error');
  }
}

function loadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      data = JSON.parse(ev.target.result);
      if (!data.categories) throw new Error();
      selCatId = selQuizId = null;
      renderTree();
      renderMain();
      toast('Loaded ' + file.name + ' ✓', 'success');
    } catch {
      toast('Invalid JSON file', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Dirty tracking ────────────────────────────
function markDirty() {
  dirty = true;
  document.getElementById('dirty-badge').classList.add('show');
}
function clearDirty() {
  dirty = false;
  document.getElementById('dirty-badge').classList.remove('show');
}

// ── Tree ──────────────────────────────────────
function renderTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  (data.categories || []).forEach(cat => {
    const isOpen = cat._open !== false;
    const div = document.createElement('div');
    div.className = 'tree-category';
    div.innerHTML = `
      <div class="tree-cat-header" onclick="toggleCat('${cat.id}')">
        <span class="tree-cat-toggle">${isOpen ? '▼' : '▶'}</span>
        <span class="tree-cat-name">${esc(cat.name)}</span>
        <span class="tree-cat-count">${cat.quizzes.length}q</span>
        <span class="tree-cat-actions">
          <button class="btn-icon" onclick="event.stopPropagation();renameCat('${cat.id}')" title="Rename">✎</button>
          <button class="btn-icon" style="color:var(--red)" onclick="event.stopPropagation();deleteCat('${cat.id}')" title="Delete">✕</button>
        </span>
      </div>
      ${isOpen ? `
      <div class="tree-quizzes">
        ${cat.quizzes.map(q => `
          <div class="tree-quiz ${selCatId===cat.id&&selQuizId===q.id?'active':''}" onclick="selectQuiz('${cat.id}','${q.id}')">
            <div class="tree-quiz-dot"></div>
            <div class="tree-quiz-name">${esc(q.name)}</div>
            <div class="tree-quiz-count">${q.questions.length}</div>
            <span class="tree-quiz-actions">
              <button class="btn-icon" onclick="event.stopPropagation();deleteQuiz('${cat.id}','${q.id}')" title="Delete" style="color:var(--red)">✕</button>
            </span>
          </div>`).join('')}
        <div class="tree-add-quiz" onclick="addQuiz('${cat.id}')">+ Add quiz</div>
      </div>` : ''}
    `;
    tree.appendChild(div);
  });
}

function toggleCat(catId) {
  const cat = getCat(catId);
  if (cat) { cat._open = cat._open === false ? true : false; renderTree(); }
}

// ── CRUD: Categories ──────────────────────────
function addCategory() {
  showModal('New category', '', [
    { label: 'Category name', id: 'modal-input', placeholder: 'e.g. TV Shows' }
  ], [
    { label: 'Cancel', cls: 'btn-ghost', fn: closeModal },
    { label: 'Create', cls: 'btn-primary', fn: () => {
      const name = document.getElementById('modal-input').value.trim();
      if (!name) return;
      const id = slugify(name);
      if (data.categories.find(c => c.id === id)) { alert('A category with that name already exists.'); return; }
      data.categories.push({ id, name, icon: '📝', iconClass: 'cat-icon-books', quizzes: [], _open: true });
      markDirty(); renderTree(); closeModal();
      toast('Category "' + name + '" created', 'success');
    }}
  ]);
}

function renameCat(catId) {
  const cat = getCat(catId);
  showModal('Rename category', '', [
    { label: 'New name', id: 'modal-input', placeholder: cat.name, value: cat.name }
  ], [
    { label: 'Cancel', cls: 'btn-ghost', fn: closeModal },
    { label: 'Rename', cls: 'btn-primary', fn: () => {
      const name = document.getElementById('modal-input').value.trim();
      if (!name) return;
      cat.name = name;
      markDirty(); renderTree(); renderMain(); closeModal();
    }}
  ]);
}

function deleteCat(catId) {
  const cat = getCat(catId);
  showModal('Delete category', `Delete "${cat.name}" and all its quizzes and questions? This cannot be undone.`, [], [
    { label: 'Cancel', cls: 'btn-ghost', fn: closeModal },
    { label: 'Delete', cls: 'btn-danger', fn: () => {
      data.categories = data.categories.filter(c => c.id !== catId);
      if (selCatId === catId) { selCatId = selQuizId = null; }
      markDirty(); renderTree(); renderMain(); closeModal();
    }}
  ]);
}

// ── CRUD: Quizzes ─────────────────────────────
function addQuiz(catId) {
  showModal('New quiz', '', [
    { label: 'Quiz name', id: 'modal-input', placeholder: 'e.g. Harry Potter' },
    { label: 'Description', id: 'modal-input2', placeholder: 'e.g. Wizards, spells and Hogwarts' }
  ], [
    { label: 'Cancel', cls: 'btn-ghost', fn: closeModal },
    { label: 'Create', cls: 'btn-primary', fn: () => {
      const name = document.getElementById('modal-input').value.trim();
      const desc = document.getElementById('modal-input2').value.trim();
      if (!name) return;
      const cat = getCat(catId);
      const id = catId + '-' + slugify(name);
      cat.quizzes.push({ id, name, description: desc || name, questions: [] });
      markDirty();
      selectQuiz(catId, id);
      closeModal();
    }}
  ]);
}

function deleteQuiz(catId, quizId) {
  const quiz = getQuiz(catId, quizId);
  showModal('Delete quiz', `Delete "${quiz.name}" and all ${quiz.questions.length} questions? This cannot be undone.`, [], [
    { label: 'Cancel', cls: 'btn-ghost', fn: closeModal },
    { label: 'Delete', cls: 'btn-danger', fn: () => {
      const cat = getCat(catId);
      cat.quizzes = cat.quizzes.filter(q => q.id !== quizId);
      if (selCatId === catId && selQuizId === quizId) { selQuizId = null; }
      markDirty(); renderTree(); renderMain(); closeModal();
    }}
  ]);
}

function onQuizMetaChange() {
  const quiz = getQuiz(selCatId, selQuizId);
  if (!quiz) return;
  quiz.name = document.getElementById('quiz-name-input').value;
  quiz.description = document.getElementById('quiz-desc-input').value;
  markDirty();
  renderTree();
}

// ── Select quiz ───────────────────────────────
function selectQuiz(catId, quizId) {
  selCatId  = catId;
  selQuizId = quizId;
  editingIdx = null;
  renderTree();
  renderMain();
}

// ── Render main ───────────────────────────────
function renderMain() {
  const hasQuiz = !!(selCatId && selQuizId);
  document.getElementById('empty-header').style.display = hasQuiz ? 'none' : '';
  document.getElementById('quiz-header').style.display  = hasQuiz ? '' : 'none';
  document.getElementById('empty-state').style.display  = hasQuiz ? 'none' : '';
  document.getElementById('q-list').style.display       = hasQuiz ? '' : 'none';
  document.getElementById('add-q-btn-wrap').style.display = hasQuiz ? '' : 'none';

  if (!hasQuiz) { document.getElementById('q-editor').style.display = 'none'; return; }

  const cat  = getCat(selCatId);
  const quiz = getQuiz(selCatId, selQuizId);

  // Header
  document.getElementById('crumb').textContent = cat.name;
  document.getElementById('quiz-name-input').value = quiz.name;
  document.getElementById('quiz-desc-input').value = quiz.description || '';
  document.getElementById('stat-q').textContent = quiz.questions.length;

  const warn = document.getElementById('stat-warn');
  if (quiz.questions.length < 15) {
    warn.textContent = `⚠ ${15 - quiz.questions.length} more needed for a full quiz`;
    warn.style.display = '';
  } else {
    warn.style.display = 'none';
  }

  // Questions list
  const list = document.getElementById('q-list');
  list.innerHTML = '';
  if (quiz.questions.length === 0) {
    list.innerHTML = '<div style="font-style:italic;color:var(--dim);font-size:13px;padding:0.5rem 0">No questions yet — add one below.</div>';
  }
  const letters = ['A','B','C','D'];
  quiz.questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `
      <div class="q-num">${i + 1}</div>
      <div class="q-body">
        <div class="q-text">${esc(q.q)}</div>
        <div class="q-options">
          ${q.options.map((o, oi) => `<div class="q-opt ${oi===q.answer?'correct':''}">
            <span class="q-opt-letter">${letters[oi]}${oi===q.answer?' ✓':''}</span>${esc(o)}
          </div>`).join('')}
        </div>
        ${q.fact ? `<div class="q-fact">💡 ${esc(q.fact)}</div>` : ''}
      </div>
      <div class="q-actions">
        <button class="q-edit-btn" onclick="openEditor(${i})">✎ Edit</button>
        <button class="btn-icon" onclick="moveQ(${i},-1)" title="Move up" ${i===0?'disabled':''}>↑</button>
        <button class="btn-icon" onclick="moveQ(${i},1)"  title="Move down" ${i===quiz.questions.length-1?'disabled':''}>↓</button>
        <button class="btn-icon" style="color:var(--red)" onclick="deleteQ(${i})" title="Delete">✕</button>
      </div>
    `;
    list.appendChild(card);
  });
}

// ── Question editor ───────────────────────────
function openEditor(idx) {
  editingIdx = idx;
  const editor = document.getElementById('q-editor');
  editor.style.display = '';
  document.getElementById('editor-title').textContent = idx === -1 ? 'Add question' : `Edit question ${idx + 1}`;
  document.getElementById('v-msg').textContent = '';

  // Clear errors
  ['f-q','f-o0','f-o1','f-o2','f-o3'].forEach(id => document.getElementById(id).classList.remove('error'));

  if (idx === -1) {
    document.getElementById('f-q').value = '';
    ['f-o0','f-o1','f-o2','f-o3'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-fact').value = '';
    document.querySelectorAll('.opt-radio').forEach(r => r.checked = false);
  } else {
    const q = getQuiz(selCatId, selQuizId).questions[idx];
    document.getElementById('f-q').value = q.q;
    q.options.forEach((o, i) => document.getElementById('f-o' + i).value = o);
    document.getElementById('f-fact').value = q.fact || '';
    document.querySelectorAll('.opt-radio').forEach(r => { r.checked = parseInt(r.value) === q.answer; });
  }

  editor.scrollIntoView({ behavior: 'smooth' });
  document.getElementById('f-q').focus();
}

function closeEditor() {
  editingIdx = null;
  document.getElementById('q-editor').style.display = 'none';
}

function saveQuestion(andNext = false) {
  const qText   = document.getElementById('f-q').value.trim();
  const opts    = [0,1,2,3].map(i => document.getElementById('f-o'+i).value.trim());
  const correct = document.querySelector('.opt-radio:checked');
  const fact    = document.getElementById('f-fact').value.trim();
  const vMsg    = document.getElementById('v-msg');

  // Validate
  let valid = true;
  document.getElementById('f-q').classList.toggle('error', !qText);
  opts.forEach((o,i) => document.getElementById('f-o'+i).classList.toggle('error', !o));
  if (!qText) { vMsg.textContent = 'Question text is required.'; valid = false; }
  else if (opts.some(o => !o)) { vMsg.textContent = 'All four options are required.'; valid = false; }
  else if (!correct) { vMsg.textContent = 'Select the correct answer.'; valid = false; }
  if (!valid) return;

  vMsg.textContent = '';
  const entry = { q: qText, options: opts, answer: parseInt(correct.value), fact };

  const quiz = getQuiz(selCatId, selQuizId);
  if (editingIdx === -1) {
    quiz.questions.push(entry);
  } else {
    quiz.questions[editingIdx] = entry;
  }

  markDirty();
  renderMain();

  if (andNext) {
    openEditor(-1);
  } else {
    closeEditor();
    // Scroll to bottom of list
    const area = document.getElementById('questions-area');
    area.scrollTop = area.scrollHeight;
  }
}

function deleteQ(idx) {
  const quiz = getQuiz(selCatId, selQuizId);
  quiz.questions.splice(idx, 1);
  if (editingIdx === idx) closeEditor();
  markDirty();
  renderMain();
}

function moveQ(idx, dir) {
  const quiz = getQuiz(selCatId, selQuizId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= quiz.questions.length) return;
  [quiz.questions[idx], quiz.questions[newIdx]] = [quiz.questions[newIdx], quiz.questions[idx]];
  markDirty();
  renderMain();
}

// ── Download ──────────────────────────────────
function downloadJSON() {
  if (!data || !data.categories) { toast('No data to export', 'error'); return; }

  // Strip internal _open flags before export
  const clean = JSON.parse(JSON.stringify(data));
  clean.categories.forEach(c => delete c._open);

  // Summary
  const cats   = clean.categories.length;
  const quizzes = clean.categories.reduce((n, c) => n + c.quizzes.length, 0);
  const qs     = clean.categories.reduce((n, c) => n + c.quizzes.reduce((m, q) => m + q.questions.length, 0), 0);

  const json = JSON.stringify(clean, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'quizzes.json';
  a.click();
  URL.revokeObjectURL(url);
  clearDirty();
  toast(`Downloaded — ${cats} categories, ${quizzes} quizzes, ${qs} questions ✓`, 'success');
}

// ── Helpers ───────────────────────────────────
function getCat(catId)          { return data.categories.find(c => c.id === catId); }
function getQuiz(catId, quizId) { return getCat(catId)?.quizzes.find(q => q.id === quizId); }
function slugify(str)           { return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
function esc(str)               { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Modal ─────────────────────────────────────
function showModal(title, body, inputs, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;

  const inputRow = document.getElementById('modal-input-row');
  if (inputs.length > 0) {
    inputRow.style.display = '';
    document.getElementById('modal-input-label').textContent = inputs[0].label;
    const i1 = document.getElementById('modal-input');
    i1.placeholder = inputs[0].placeholder || '';
    i1.value = inputs[0].value || '';

    if (inputs[1]) {
      document.getElementById('modal-input2-label').textContent = inputs[1].label;
      document.getElementById('modal-input2-label').style.display = '';
      const i2 = document.getElementById('modal-input2');
      i2.style.display = '';
      i2.placeholder = inputs[1].placeholder || '';
      i2.value = inputs[1].value || '';
    } else {
      document.getElementById('modal-input2-label').style.display = 'none';
      document.getElementById('modal-input2').style.display = 'none';
    }
  } else {
    inputRow.style.display = 'none';
  }

  const actDiv = document.getElementById('modal-actions');
  actDiv.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + a.cls;
    btn.textContent = a.label;
    btn.onclick = a.fn;
    actDiv.appendChild(btn);
  });

  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);

  // Enter key submits last action
  document.getElementById('modal-input').onkeydown = e => { if (e.key === 'Enter') actions[actions.length-1].fn(); };
  document.getElementById('modal-input2').onkeydown = e => { if (e.key === 'Enter') actions[actions.length-1].fn(); };
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// ── Toast ─────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Keyboard shortcuts ────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeEditor(); closeModal(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); downloadJSON(); }
});
</script>
