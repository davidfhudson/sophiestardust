<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Sophie's Stardust</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">

  <nav class="nav">
    <a class="nav-logo" href="index.html"><span class="star">✦</span> Sophie's Stardust</a>
    <span class="score-badge" id="score-display">Score: 0</span>
  </nav>

  <div class="quiz-meta-row" style="padding:0.9rem 1.25rem 0.3rem;display:flex;align-items:center;justify-content:space-between">
    <div class="quiz-category-tag" id="quiz-category-tag"></div>
    <div style="font-size:11px;color:var(--text-dim)">Q<span id="q-current">1</span> of <span id="q-total">15</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="question-area">
    <p class="question-text" id="question-text"></p>
  </div>

  <div class="answers" id="answers"></div>

  <div class="feedback-wrap">
    <div class="feedback-box" id="feedback-box"></div>
  </div>

  <div class="next-wrap hidden" id="next-wrap">
    <button class="btn btn-primary" style="width:100%;text-align:center" id="next-btn">Next Question →</button>
  </div>

  <div class="spacer"></div>
  <nav class="bottom-bar">
    <a class="bb-item" href="index.html"><span class="bb-icon">⌂</span><span>Home</span></a>
    <a class="bb-item" href="leaderboard.html"><span class="bb-icon">◉</span><span>Scores</span></a>
  </nav>

</div>
<script src="config.js"></script>
<script src="js/app.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
